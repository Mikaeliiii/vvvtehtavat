<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Reaktiopeli</title>
<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #peli {
    width: 400px;
    height: 300px;
    background: red;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    text-align: center;
  }
</style>
</head>
<body>

<div id="peli">Klikkaa aloittaaksesi</div>

<script>
const peli = document.getElementById("peli");

let aloitusAika;
let timeout;
let odottaa = false;

// Aloitus
peli.addEventListener("click", () => {

  if (!odottaa) {
    peli.textContent = "Odota...";
    peli.style.background = "orange";

    let aika = 1000 + Math.random() * 3000;

    timeout = setTimeout(() => {
      peli.style.background = "green";
      peli.textContent = "KLIKKAA NYT!";
      aloitusAika = Date.now();
      odottaa = true;
    }, aika);

  } else {
    let reaktio = Date.now() - aloitusAika;
    peli.textContent = "Reaktioaika: " + reaktio + " ms";
    peli.style.background = "blue";
    odottaa = false;
  }
});

// liian aikainen klikkaus
peli.addEventListener("mousedown", () => {
  if (!odottaa && timeout) {
    clearTimeout(timeout);
    peli.textContent = "Liian aikaisin! Klikkaa uudestaan";
    peli.style.background = "red";
  }
});
</script>

</body>
</html>
